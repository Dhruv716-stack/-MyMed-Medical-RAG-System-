version: "3.9"

services:

  qdrant:

    image: qdrant/qdrant:latest

    container_name: mymed-qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - ./docker/qdrant/storage:/qdrant/storage

    environment:
      QDRANT__LOG_LEVEL: INFO

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5